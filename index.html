<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f3f5fb;
  --surface: #ffffff;
  --surface-alt: #f7f9ff;
  --border: #dde2f0;
  --border-strong: #c4cce0;
  --text: #181c2e;
  --text-muted: #5a6380;
  --text-faint: #9098b4;
  --accent: #2c5af0;
  --accent-bg: #eef2ff;
  --accent-border: #c7d3fd;
  --header-bg: rgba(255,255,255,0.92);
  --admin-bg: #f0fdf4;
  --admin-border: #bbf7d0;
  --admin-text: #15803d;
  --scrollbar: #c4cce0;
  --shadow: 0 2px 20px rgba(0,0,0,0.09);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0c0e1a;
    --surface: #151828;
    --surface-alt: #1a1e30;
    --border: #242740;
    --border-strong: #2e3250;
    --text: #e3e7f5;
    --text-muted: #8490b0;
    --text-faint: #48526e;
    --accent: #5f8ff8;
    --accent-bg: #18234e;
    --accent-border: #283868;
    --header-bg: rgba(12,14,26,0.92);
    --admin-bg: #0e1f10;
    --admin-border: #1a3d1e;
    --admin-text: #4ade80;
    --scrollbar: #2e3250;
    --shadow: 0 2px 20px rgba(0,0,0,0.45);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px;}
button,input,textarea,select{font-family:inherit;}
</style>
</helmet>

<div style="height: 100vh; display: flex; flex-direction: column; background: var(--bg);">

  <header style="height: 52px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; background: var(--header-bg); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; gap: 12px;">
    <div style="display: flex; align-items: center; gap: 10px; min-width: 0; overflow: hidden;">
      <div style="width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; flex-shrink: 0;">◆</div>
      <span style="font-weight: 700; font-size: 15px; letter-spacing: -0.02em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Loyalty Tier Matrix</span>
      <sc-if value="{{ adminMode }}" hint-placeholder-val="{{ false }}">
        <span style="font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: var(--admin-bg); color: var(--admin-text); border: 1px solid var(--admin-border); letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0;">Admin Mode</span>
      </sc-if>
    </div>
    <div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
      <sc-if value="{{ adminMode }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ logout }}" style="font-size: 13px; padding: 6px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-weight: 500; white-space: nowrap;">Log out</button>
      </sc-if>
      <sc-if value="{{ showLoginBtn }}" hint-placeholder-val="{{ true }}">
        <button onClick="{{ openLogin }}" style="font-size: 13px; padding: 6px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-weight: 500; white-space: nowrap;">Admin</button>
      </sc-if>
      <button onClick="{{ toggleDark }}" title="Toggle dark/light mode" style="width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 16px; color: var(--text); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;">{{ darkIcon }}</button>
    </div>
  </header>

  <sc-if value="{{ adminMode }}" hint-placeholder-val="{{ false }}">
    <div style="flex-shrink: 0; background: var(--admin-bg); border-bottom: 1px solid var(--admin-border); padding: 8px 24px; font-size: 12px; color: var(--admin-text); font-weight: 500; display: flex; align-items: center; gap: 8px; line-height: 1.4;">
      <span style="flex-shrink: 0;">🔐</span>
      <span>Admin Mode — all rows and columns visible. Must Do &amp; internal comments shown. Changes auto-save on blur. Drag ⠿ handles to reorder rows.</span>
    </div>
  </sc-if>

  {{ legendEl }}

  <div style="flex: 1; overflow: auto; min-height: 0;">
    {{ tableEl }}
  </div>

</div>

{{ popoverEl }}
{{ loginModal }}
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1400, &quot;height&quot;: 900}}">
// ─── SEED DATA ────────────────────────────────────────────────────────────────

const INIT_PLATFORMS = [
  { id: 'p1', name: 'Legacy VIP Tiers', visible: true },
  { id: 'p2', name: 'Loyalty Tiers – Shopify', visible: true },
  { id: 'p3', name: 'Loyalty Tiers – Custom', visible: true },
  { id: 'p4', name: 'Loyalty Tiers – Magento / Magento2', visible: true },
  { id: 'p5', name: 'Loyalty Tiers – BigCommerce', visible: true },
  { id: 'p6', name: 'Loyalty Tiers – Cloud Commerce', visible: true },
];

function mkF(id, name, mustDo, comment, p1, p2, p3, p4, p5, p6) {
  const c = v => ({ value: v || '', reasoning: '' });
  return { id, name, visible: true, mustDo: !!mustDo, comment: comment || '',
    cells: { p1: c(p1), p2: c(p2), p3: c(p3), p4: c(p4), p5: c(p5), p6: c(p6) } };
}

const S   = 'Supported';
const NS  = 'Not supported';
const TBD = 'TBD – Under Review';
const PTD = 'Points supported, Discounts TBD';
const C45 = 'Supported (capped 45 days, Amount Spent only)';
const SEP = 'Supported (separate setting from Tier Term)';
const UNL = 'Supported (unlimited, soft cap of 15)';

const INIT_FEATURES = [
  mkF('f01','Number of tiers',0,'',S,UNL,UNL,UNL,UNL,UNL),
  mkF('f02','Base tier',0,'',S,S,S,S,S,S),
  mkF('f03','Entry reward types: discounts and/or points',1,'','Supported – award both at same time',S,PTD,PTD,PTD,'Discounts TBD'),
  mkF('f04','Tier term: Lifetime',0,'',S,S,S,S,S,S),
  mkF('f05','Tier term: Calendar Year',0,'',S,S,S,S,S,S),
  mkF('f06','Tier term: Rolling Year (12 months)',0,'',S,S,S,S,S,S),
  mkF('f07','Tier entry eligibility period: Lifetime',0,'The entry eligibility must match the tier term',SEP,NS,NS,NS,NS,NS),
  mkF('f08','Tier entry eligibility period: Calendar Year',0,'The entry eligibility must match the tier term',SEP,NS,NS,NS,NS,NS),
  mkF('f09','Tier entry eligibility period: Rolling Year',0,'The entry eligibility must match the tier term',SEP,NS,NS,NS,NS,NS),
  mkF('f10','Tier downgrade on refund',0,'',S,S,S,S,S,S),
  mkF('f11','Include pre-opt-in actions toggle',0,'',S,S,S,S,S,S),
  mkF('f12','Tier delay (anti-fraud)',0,'',S,C45,C45,C45,C45,C45),
  mkF('f13','Manual tier assignment',0,'',NS,S,S,S,S,S),
  mkF('f14','Customer tags as entry threshold',0,'',NS,S,'Supported – via API',NS,NS,NS),
  mkF('f15','Free shipping tier benefit',0,'This was only supported by Shopify','Supported – Shopify Only',S,NS,NS,NS,NS),
  mkF('f16','Birthday reward tier benefit',1,'',S,S,PTD,PTD,PTD,PTD),
  mkF('f17','Anniversary reward tier benefit',1,'',S,S,PTD,PTD,PTD,PTD),
  mkF('f18','Points multiplier on purchases (base tier benefit)',0,'',S,S,S,S,S,S),
  mkF('f19','Points multiplier applied to Referral Program',0,'There is limited value with referrals',S,NS,NS,NS,NS,NS),
  mkF('f20','Points multiplier applied to Account Creation',0,'',S,S,S,S,S,S),
  mkF('f21','Points multiplier applied to Goal Spend',0,'',S,S,S,S,S,S),
  mkF('f22','Points multiplier applied to Twitter Follow',0,'',S,S,S,S,S,S),
  mkF('f23','Multiple threshold types with AND/OR logic',0,'Very good to have – we will evaluate – 15SP',S,TBD,TBD,TBD,TBD,TBD),
  mkF('f24','Purchases Made as entry criteria',0,'Daniel Garcia to check if low-hanging fruit; does not need multiple threshold. 8SP',S,TBD,TBD,TBD,TBD,TBD),
  mkF('f25','Referrals Completed as entry criteria',0,'',S,NS,NS,NS,NS,NS),
  mkF('f26','Campaign Completed as entry criteria',0,'Supported by Tags','Supported – via API','Supported by Tags','Supported by Tags',NS,NS,NS),
  mkF('f27','Separate Entry / Retention / Re-entry criteria',0,'',S,NS,NS,NS,NS,NS),
  mkF('f28','Single-tier-only downgrade option',0,"Need a narrative on why we don't want this — creates noise in the customer base",S,NS,NS,NS,NS,NS),
  mkF('f29','Multistore support',1,'15SP',S,S,S,S,S,S),
];

// ─── STYLE HELPERS (module-level) ─────────────────────────────────────────────

function thBase(t) {
  return {
    background: t.stickyH,
    borderBottom: `2px solid ${t.borderStrong}`,
    padding: '10px 12px',
    textAlign: 'center',
    fontSize: '12px',
    fontWeight: 600,
    color: t.textMuted,
    letterSpacing: '0.03em',
    whiteSpace: 'normal',
    lineHeight: 1.35,
    verticalAlign: 'bottom',
  };
}

function tdBase(t, ri) {
  return {
    borderBottom: `1px solid ${t.border}`,
    padding: '10px 12px',
    background: ri % 2 === 0 ? t.surface : t.surfaceAlt,
    verticalAlign: 'middle',
  };
}

function btnBase(t, muted) {
  return {
    background: 'transparent', border: 'none', cursor: 'pointer',
    padding: '3px 5px', borderRadius: '4px',
    color: muted ? t.textFaint : t.textMuted,
    fontSize: '13px', lineHeight: 1,
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    opacity: muted ? 0.55 : 1, flexShrink: 0,
  };
}

function inputBase(t) {
  return {
    background: t.surfaceAlt, border: `1px solid ${t.border}`,
    borderRadius: '5px', color: t.text, fontSize: '12px',
    padding: '5px 7px', width: '100%', outline: 'none',
    lineHeight: 1.4,
  };
}

// ─── COMPONENT ────────────────────────────────────────────────────────────────

class Component extends DCLogic {
  state = {
    platforms: null, features: null,
    adminMode: false,
    loginOpen: false, loginEmail: '', loginPassword: '', loginError: '',
    isDark: null,
    popover: null,
    editingPlatformId: null,
    dragRowId: null, dragOverRowId: null,
  };

  ADMIN_USER = 'admin';
  ADMIN_PASS = '1qaz2wsx';

  componentDidMount() {
    const saved = localStorage.getItem('ltm-v2-data');
    if (saved) {
      try {
        const d = JSON.parse(saved);
        this.setState({ platforms: d.platforms, features: d.features });
      } catch (_) {
        this.setState({ platforms: INIT_PLATFORMS, features: INIT_FEATURES });
      }
    } else {
      this.setState({ platforms: INIT_PLATFORMS, features: INIT_FEATURES });
    }

    const dp = localStorage.getItem('ltm-v2-dark');
    this.setState({ isDark: dp === null ? null : dp === '1' }, () => this.applyTheme());

    this.mql = window.matchMedia('(prefers-color-scheme: dark)');
    this._mqlCb = () => { if (this.state.isDark === null) this.applyTheme(); };
    this.mql.addEventListener('change', this._mqlCb);

    this._docClick = (e) => {
      if (this.state.popover && !e.target.closest('[data-popover]')) {
        this.setState({ popover: null });
      }
    };
    this._keyDown = (e) => {
      if (e.key === 'Escape') this.setState({ popover: null, loginOpen: false, loginError: '' });
    };
    document.addEventListener('click', this._docClick);
    document.addEventListener('keydown', this._keyDown);
  }

  componentDidUpdate() { this.applyTheme(); }

  componentWillUnmount() {
    this.mql && this.mql.removeEventListener('change', this._mqlCb);
    document.removeEventListener('click', this._docClick);
    document.removeEventListener('keydown', this._keyDown);
  }

  applyTheme() {
    const d = this.isDark;
    const v = d ? [
      ['--bg','#0c0e1a'],['--surface','#151828'],['--surface-alt','#1a1e30'],
      ['--border','#242740'],['--border-strong','#2e3250'],
      ['--text','#e3e7f5'],['--text-muted','#8490b0'],['--text-faint','#48526e'],
      ['--accent','#5f8ff8'],['--accent-bg','#18234e'],['--accent-border','#283868'],
      ['--header-bg','rgba(12,14,26,0.92)'],
      ['--admin-bg','#0e1f10'],['--admin-border','#1a3d1e'],['--admin-text','#4ade80'],
      ['--scrollbar','#2e3250'],['--shadow','0 2px 20px rgba(0,0,0,0.45)'],
    ] : [
      ['--bg','#f3f5fb'],['--surface','#ffffff'],['--surface-alt','#f7f9ff'],
      ['--border','#dde2f0'],['--border-strong','#c4cce0'],
      ['--text','#181c2e'],['--text-muted','#5a6380'],['--text-faint','#9098b4'],
      ['--accent','#2c5af0'],['--accent-bg','#eef2ff'],['--accent-border','#c7d3fd'],
      ['--header-bg','rgba(255,255,255,0.92)'],
      ['--admin-bg','#f0fdf4'],['--admin-border','#bbf7d0'],['--admin-text','#15803d'],
      ['--scrollbar','#c4cce0'],['--shadow','0 2px 20px rgba(0,0,0,0.09)'],
    ];
    v.forEach(([k, val]) => document.documentElement.style.setProperty(k, val));
  }

  get isDark() {
    return this.state.isDark !== null
      ? this.state.isDark
      : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  }

  get t() {
    const d = this.isDark;
    return {
      bg:          d ? '#0c0e1a' : '#f3f5fb',
      surface:     d ? '#151828' : '#ffffff',
      surfaceAlt:  d ? '#1a1e30' : '#f7f9ff',
      border:      d ? '#242740' : '#dde2f0',
      borderStrong:d ? '#2e3250' : '#c4cce0',
      text:        d ? '#e3e7f5' : '#181c2e',
      textMuted:   d ? '#8490b0' : '#5a6380',
      textFaint:   d ? '#48526e' : '#9098b4',
      accent:      d ? '#5f8ff8' : '#2c5af0',
      accentBg:    d ? '#18234e' : '#eef2ff',
      accentBorder:d ? '#283868' : '#c7d3fd',
      stickyH:     d ? 'rgba(21,24,40,0.98)' : 'rgba(247,249,255,0.98)',
      stickyBg:    d ? '#151828' : '#ffffff',
      adminBg:     d ? '#0e1f10' : '#f0fdf4',
      adminBorder: d ? '#1a3d1e' : '#bbf7d0',
      adminText:   d ? '#4ade80' : '#15803d',
      shadow:      d ? '0 2px 20px rgba(0,0,0,0.45)' : '0 2px 20px rgba(0,0,0,0.09)',
      modalBg:     d ? 'rgba(0,0,0,0.72)' : 'rgba(15,18,40,0.55)',
    };
  }

  persist() {
    const { platforms, features } = this.state;
    if (platforms && features)
      localStorage.setItem('ltm-v2-data', JSON.stringify({ platforms, features }));
  }

  inferStatus(value) {
    if (!value || !value.trim()) return 'empty';
    const v = value.trim().toLowerCase();
    if (v === 'supported') return 'supported';
    if (v.startsWith('not supported')) return 'not-supported';
    if (v.includes('tbd') || v.includes('under review')) return 'tbd';
    return 'partial';
  }

  pillColors(status) {
    const d = this.isDark;
    const m = {
      supported:       d ? {bg:'#0d2318',text:'#4ade80',border:'#163624'} : {bg:'#f0fdf4',text:'#15803d',border:'#bbf7d0'},
      'not-supported': d ? {bg:'#1e0f0f',text:'#fca5a5',border:'#3a1a1a'} : {bg:'#fff1f2',text:'#be123c',border:'#fecdd3'},
      partial:         d ? {bg:'#101d3d',text:'#93c5fd',border:'#1c2e5c'} : {bg:'#eff6ff',text:'#1d4ed8',border:'#bfdbfe'},
      tbd:             d ? {bg:'#1c1400',text:'#fcd34d',border:'#2e2100'} : {bg:'#fffbeb',text:'#b45309',border:'#fde68a'},
      empty:           d ? {bg:'#1a1e30',text:'#48526e',border:'#242740'} : {bg:'#f7f9ff',text:'#9098b4',border:'#dde2f0'},
    };
    return m[status] || m.empty;
  }

  pillIcon(status) {
    return {supported:'✓','not-supported':'✗',partial:'ⓘ',tbd:'?',empty:'–'}[status]||'–';
  }

  handleLogin(e) {
    e.preventDefault();
    const { loginEmail, loginPassword } = this.state;
    if (loginEmail.trim() === this.ADMIN_USER && loginPassword === this.ADMIN_PASS) {
      this.setState({ adminMode: true, loginOpen: false, loginEmail: '', loginPassword: '', loginError: '' });
    } else {
      this.setState({ loginError: 'Incorrect username or password.' });
    }
  }

  updateCell(fid, pid, field, val) {
    const features = this.state.features.map(f =>
      f.id !== fid ? f : { ...f, cells: { ...f.cells, [pid]: { ...(f.cells[pid]||{}), [field]: val } } }
    );
    this.setState({ features }, () => this.persist());
  }

  updateFeature(fid, upd) {
    this.setState({ features: this.state.features.map(f => f.id===fid ? {...f,...upd} : f) }, () => this.persist());
  }

  updatePlatform(pid, upd) {
    this.setState({ platforms: this.state.platforms.map(p => p.id===pid ? {...p,...upd} : p) }, () => this.persist());
  }

  addFeature() {
    const id = 'f'+Date.now();
    const cells = {};
    this.state.platforms.forEach(p => { cells[p.id] = { value: '', reasoning: '' }; });
    this.setState({
      features: [...this.state.features, { id, name: 'New Feature', visible: true, mustDo: false, comment: '', cells }]
    }, () => this.persist());
  }

  deleteFeature(id) {
    this.setState({ features: this.state.features.filter(f => f.id !== id) }, () => this.persist());
  }

  addPlatform() {
    const id = 'p'+Date.now();
    const platforms = [...this.state.platforms, { id, name: 'New Platform', visible: true }];
    const features = this.state.features.map(f => ({
      ...f, cells: { ...f.cells, [id]: { value: '', reasoning: '' } }
    }));
    this.setState({ platforms, features }, () => this.persist());
  }

  deletePlatform(id) {
    const features = this.state.features.map(f => {
      const cells = { ...f.cells }; delete cells[id]; return { ...f, cells };
    });
    this.setState({ platforms: this.state.platforms.filter(p => p.id !== id), features }, () => this.persist());
  }

  moveRow(fromId, toId) {
    const feats = [...this.state.features];
    const fi = feats.findIndex(f => f.id === fromId);
    const ti = feats.findIndex(f => f.id === toId);
    if (fi < 0 || ti < 0 || fi === ti) return;
    const [item] = feats.splice(fi, 1);
    feats.splice(ti, 0, item);
    this.setState({ features: feats, dragRowId: null, dragOverRowId: null }, () => this.persist());
  }

  // ── Render helpers ──────────────────────────────────────────────────────────

  renderCell(f, p, t, ri, adminMode) {
    const cell = f.cells[p.id] || { value: '', reasoning: '' };
    const status = this.inferStatus(cell.value);
    const pc = this.pillColors(status);
    const isClickable = !adminMode && status !== 'supported' && status !== 'empty';
    const dimmed = !p.visible && adminMode;

    const td = {
      ...tdBase(t, ri),
      width: 180, minWidth: 180,
      verticalAlign: adminMode ? 'top' : 'middle',
      opacity: dimmed ? 0.35 : 1,
    };

    if (adminMode) {
      return React.createElement('td', { key: p.id, style: td },
        React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '4px' } }, [
          React.createElement('input', {
            key: 'v', defaultValue: cell.value, placeholder: 'Status…',
            onBlur: (e) => this.updateCell(f.id, p.id, 'value', e.target.value),
            style: inputBase(t),
          }),
          React.createElement('textarea', {
            key: 'r', defaultValue: cell.reasoning, placeholder: 'Reasoning (user-facing)…',
            rows: 2,
            onBlur: (e) => this.updateCell(f.id, p.id, 'reasoning', e.target.value),
            style: { ...inputBase(t), resize: 'vertical', fontSize: '11px', color: t.textMuted },
          }),
        ])
      );
    }

    const openPopover = (e) => {
      e.stopPropagation();
      const rect = e.currentTarget.getBoundingClientRect();
      this.setState({ popover: { x: rect.right + 10, y: rect.top, value: cell.value, reasoning: cell.reasoning } });
    };

    const iconEl = React.createElement('div', {
      onClick: isClickable ? openPopover : undefined,
      onKeyDown: isClickable ? (e) => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); openPopover(e); } } : undefined,
      tabIndex: isClickable ? 0 : undefined,
      role: isClickable ? 'button' : undefined,
      'aria-label': isClickable ? `${cell.value} — click for details` : cell.value,
      title: cell.value || undefined,
      style: {
        width: 36, height: 36, borderRadius: '50%',
        background: pc.bg, color: pc.text,
        border: `1.5px ${isClickable ? 'dashed' : 'solid'} ${pc.border}`,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        fontSize: '16px', fontWeight: 700,
        cursor: isClickable ? 'pointer' : 'default',
        outline: 'none', userSelect: 'none', flexShrink: 0,
      }
    }, this.pillIcon(status));

    return React.createElement('td', { key: p.id, style: { ...td, textAlign: 'center', verticalAlign: 'middle' } }, iconEl);
  }

  renderTable() {
    const { platforms, features, adminMode, editingPlatformId, dragRowId, dragOverRowId } = this.state;
    const t = this.t;

    const vPlats = adminMode ? platforms : platforms.filter(p => p.visible);
    const vFeats = adminMode
      ? features
      : features.filter(f => f.visible && vPlats.some(p => (f.cells[p.id]||{}).value));

    const DW=36, VW=36, NW=240, MW=72, CW=200, DEL=40, APC=60;
    const leftForName = adminMode ? DW+VW : 0;
    const CELL_W = 180;

    // ── Header ──────────────────────────────────────────────────────────────
    const hCells = [];

    if (adminMode) {
      hCells.push(React.createElement('th', { key:'dh', style:{ ...thBase(t), width:DW, minWidth:DW, position:'sticky', top:0, left:0, zIndex:30 } }, ''));
      hCells.push(React.createElement('th', { key:'vh', style:{ ...thBase(t), width:VW, minWidth:VW, position:'sticky', top:0, left:DW, zIndex:30, fontSize:'10px' } }, 'Vis'));
    }

    hCells.push(React.createElement('th', { key:'nh', style:{ ...thBase(t), textAlign:'left', paddingLeft:'16px', width:NW, minWidth:NW, position:'sticky', top:0, left:leftForName, zIndex:25 } }, 'Feature'));

    vPlats.forEach(p => {
      const nameEl = editingPlatformId === p.id
        ? React.createElement('input', {
            key:'ri', defaultValue:p.name, autoFocus:true,
            onBlur: (e) => { this.updatePlatform(p.id,{name:e.target.value}); this.setState({editingPlatformId:null}); },
            onKeyDown: (e) => { if(e.key==='Enter'||e.key==='Escape') e.target.blur(); },
            style:{ ...inputBase(t), textAlign:'center', fontSize:'11px', padding:'3px 6px', fontWeight:600 },
          })
        : React.createElement('span', {
            key:'n',
            onClick: adminMode ? ()=>this.setState({editingPlatformId:p.id}) : undefined,
            style:{ cursor: adminMode?'pointer':'default', fontWeight:600, color:t.text, fontSize:'12px', display:'block', marginBottom: adminMode?'6px':0 }
          }, p.name);

      const ctrlEl = adminMode && React.createElement('div', { key:'ctrls', style:{ display:'flex', gap:'3px', justifyContent:'center', marginTop:'4px' } }, [
        React.createElement('button', { key:'v', title: p.visible?'Hide column':'Show column', onClick:()=>this.updatePlatform(p.id,{visible:!p.visible}), style:btnBase(t,!p.visible) }, p.visible?'👁':'🙈'),
        React.createElement('button', { key:'d', title:'Delete platform', onClick:()=>{ if(window.confirm('Delete platform "'+p.name+'"?')) this.deletePlatform(p.id); }, style:{...btnBase(t), color:'#f87171'} }, '✕'),
      ]);

      hCells.push(React.createElement('th', { key:p.id, style:{ ...thBase(t), width:CELL_W, minWidth:CELL_W, position:'sticky', top:0, zIndex:20, opacity: !p.visible&&adminMode ? 0.45 : 1 } },
        React.createElement('div', null, [nameEl, ctrlEl].filter(Boolean))
      ));
    });

    if (adminMode) {
      hCells.push(React.createElement('th', { key:'mh', style:{ ...thBase(t), width:MW, minWidth:MW, position:'sticky', top:0, zIndex:20, fontSize:'11px', background: this.isDark?'#0e1a10':'#f5fef7' } }, '★ Must Do'));
      hCells.push(React.createElement('th', { key:'ch', style:{ ...thBase(t), width:CW, minWidth:CW, textAlign:'left', paddingLeft:'10px', position:'sticky', top:0, zIndex:20, fontSize:'11px', background: this.isDark?'#0e1a10':'#f5fef7' } }, '🔒 Internal Comment'));
      hCells.push(React.createElement('th', { key:'deh', style:{ ...thBase(t), width:DEL, position:'sticky', top:0, zIndex:20 } }, ''));
      hCells.push(React.createElement('th', { key:'aph', style:{ ...thBase(t), width:APC, position:'sticky', top:0, zIndex:20 } },
        React.createElement('button', {
          onClick:()=>this.addPlatform(),
          style:{ ...btnBase(t), color:t.accent, fontSize:'11px', padding:'3px 8px', border:`1px solid ${t.accentBorder}`, borderRadius:'5px', fontWeight:600 }
        }, '+ Col')
      ));
    }

    // ── Body rows ────────────────────────────────────────────────────────────
    const rows = vFeats.map((f, ri) => {
      const isDragging = dragRowId === f.id;
      const isDragOver = dragOverRowId === f.id && dragRowId !== f.id;
      const dimRow = !f.visible && adminMode;
      const rowBg = ri%2===0 ? t.surface : t.surfaceAlt;

      const cells = [];

      if (adminMode) {
        cells.push(React.createElement('td', { key:'drag', style:{ ...tdBase(t,ri), width:DW, minWidth:DW, position:'sticky', left:0, zIndex:5, background: isDragOver?t.accentBg:rowBg, textAlign:'center', color:t.textFaint, fontSize:'16px', userSelect:'none', cursor:'grab' } }, '⠿'));
        cells.push(React.createElement('td', { key:'vis', style:{ ...tdBase(t,ri), width:VW, minWidth:VW, position:'sticky', left:DW, zIndex:5, background:rowBg, textAlign:'center' } },
          React.createElement('button', { onClick:()=>this.updateFeature(f.id,{visible:!f.visible}), title:f.visible?'Hide row':'Show row', style:btnBase(t,!f.visible) }, f.visible?'👁':'🙈')
        ));
      }

      cells.push(React.createElement('td', { key:'name',
        onDragOver: adminMode?(e)=>{e.preventDefault(); if(dragRowId&&dragRowId!==f.id) this.setState({dragOverRowId:f.id});}:undefined,
        onDrop: adminMode?(e)=>{e.preventDefault(); const dr=this.state.dragRowId; if(dr&&dr!==f.id) this.moveRow(dr,f.id);}:undefined,
        style:{ ...tdBase(t,ri), width:NW, minWidth:NW, position:'sticky', left:leftForName, zIndex:4, paddingLeft:'16px', background:isDragOver?t.accentBg:rowBg, opacity:dimRow?0.4:1 }
      },
        adminMode
          ? React.createElement('input', { defaultValue:f.name, onBlur:(e)=>this.updateFeature(f.id,{name:e.target.value}), style:{ background:'transparent', border:'none', borderBottom:`1px solid ${t.border}`, color:t.text, fontSize:'13px', width:'100%', padding:'2px 0', outline:'none', fontWeight:500 } })
          : React.createElement('span', { style:{ fontSize:'13px', fontWeight:500, color:t.text, lineHeight:1.4, display:'block' } }, f.name)
      ));

      vPlats.forEach(p => { cells.push(this.renderCell(f, p, t, ri, adminMode)); });

      if (adminMode) {
        const adminCellBg = this.isDark ? '#0c180e' : '#f5fef7';
        cells.push(React.createElement('td', { key:'must', style:{ ...tdBase(t,ri), width:MW, textAlign:'center', background:adminCellBg } },
          React.createElement('input', { type:'checkbox', checked:!!f.mustDo, onChange:(e)=>this.updateFeature(f.id,{mustDo:e.target.checked}), style:{ width:15, height:15, cursor:'pointer', accentColor:t.accent } })
        ));
        cells.push(React.createElement('td', { key:'cmt', style:{ ...tdBase(t,ri), width:CW, minWidth:CW, verticalAlign:'top', background:adminCellBg } },
          React.createElement('textarea', { defaultValue:f.comment, placeholder:'Internal note…', rows:2, onBlur:(e)=>this.updateFeature(f.id,{comment:e.target.value}), style:{ ...inputBase(t), resize:'vertical', fontSize:'11px', width:'100%', color:t.textMuted } })
        ));
        cells.push(React.createElement('td', { key:'del', style:{ ...tdBase(t,ri), width:DEL, textAlign:'center' } },
          React.createElement('button', { onClick:()=>{ if(window.confirm('Delete "'+f.name+'"?')) this.deleteFeature(f.id); }, title:'Delete row', style:{...btnBase(t), color:'#f87171'} }, '✕')
        ));
        cells.push(React.createElement('td', { key:'sp', style:tdBase(t,ri) }));
      }

      return React.createElement('tr', {
        key: f.id,
        draggable: adminMode,
        onDragStart: adminMode ? (e)=>{ e.dataTransfer.effectAllowed='move'; this.setState({dragRowId:f.id}); } : undefined,
        onDragEnd:   adminMode ? ()=>this.setState({dragRowId:null,dragOverRowId:null}) : undefined,
        style: { opacity: isDragging ? 0.35 : 1, outline: isDragOver ? `2px solid ${t.accent}` : 'none', outlineOffset: '-2px', transition: 'opacity 0.1s' }
      }, cells);
    });

    if (!rows.length) {
      rows.push(React.createElement('tr', { key:'empty' },
        React.createElement('td', { colSpan:100, style:{ ...tdBase(t,0), textAlign:'center', padding:'48px', color:t.textFaint, fontSize:'14px' } },
          'No visible features to display.'
        )
      ));
    }

    if (adminMode) {
      rows.push(React.createElement('tr', { key:'addF' },
        React.createElement('td', { colSpan:100, style:{ ...tdBase(t,rows.length), paddingLeft:'16px' } },
          React.createElement('button', { onClick:()=>this.addFeature(), style:{ ...btnBase(t), color:t.accent, fontSize:'13px', padding:'7px 14px', border:`1px solid ${t.accentBorder}`, borderRadius:'7px', fontWeight:600 } }, '+ Add Feature')
        )
      ));
    }

    const minW = (adminMode ? DW+VW+MW+CW+DEL+APC : 0) + NW + vPlats.length * CELL_W;

    return React.createElement('table', {
      style: { borderCollapse:'collapse', tableLayout:'fixed', width:'100%', minWidth:minW+'px' }
    }, [
      React.createElement('thead', { key:'th' }, React.createElement('tr', null, hCells)),
      React.createElement('tbody', { key:'tb' }, rows),
    ]);
  }

  renderLegend() {
    const t = this.t;
    const statuses = ['supported','partial','not-supported','tbd'];
    const labels = { supported:'Supported', partial:'Partial / Caveats', 'not-supported':'Not supported', tbd:'TBD / Under Review' };

    return React.createElement('div', {
      style: { flexShrink:0, display:'flex', alignItems:'center', gap:'10px', flexWrap:'wrap', padding:'10px 24px', borderBottom:`1px solid ${t.border}`, fontSize:'12px', background:t.bg }
    }, [
      React.createElement('span', { key:'lbl', style:{ color:t.textFaint, fontWeight:600, fontSize:'10px', letterSpacing:'0.08em', textTransform:'uppercase', marginRight:'2px' } }, 'Legend:'),
      ...statuses.map(status => {
        const pc = this.pillColors(status);
        const clickable = status !== 'supported';
        return React.createElement('div', { key:status, style:{ display:'flex', alignItems:'center', gap:'7px' } }, [
          React.createElement('div', { key:'ic', style:{ width:24, height:24, borderRadius:'50%', background:pc.bg, color:pc.text, border:`1.5px ${clickable?'dashed':'solid'} ${pc.border}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'13px', fontWeight:700, flexShrink:0 } }, this.pillIcon(status)),
          React.createElement('span', { key:'l', style:{ color:t.textMuted, fontWeight:500 } }, labels[status]),
        ]);
      }),
      React.createElement('span', { key:'note', style:{ color:t.textFaint, fontSize:'11px', marginLeft:'4px' } }, '· Click any non-Supported cell for details'),
    ]);
  }

  renderPopover() {
    const { popover } = this.state;
    if (!popover) return null;
    const { x, y, value, reasoning } = popover;
    const t = this.t;
    const W = window.innerWidth, H = window.innerHeight;
    const PW = 300;
    let left = x + 8;
    let top  = y;
    if (left + PW > W - 16) left = x - PW - 18;
    if (left < 8) left = 8;
    if (top + 200 > H - 16) top = H - 220;
    if (top < 8) top = 8;

    return React.createElement('div', {
      'data-popover': 'true',
      style: { position:'fixed', left, top, width:PW, zIndex:1000, background:t.surface, border:`1px solid ${t.border}`, borderRadius:'12px', boxShadow:t.shadow, padding:'16px', fontSize:'13px', lineHeight:1.55 }
    }, [
      React.createElement('div', { key:'v', style:{ fontWeight:600, color:t.text, marginBottom: reasoning?'10px':0 } }, value),
      reasoning && React.createElement('div', { key:'sep', style:{ height:'1px', background:t.border, margin:'10px 0' } }),
      reasoning && React.createElement('div', { key:'rl', style:{ fontSize:'10px', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em', color:t.textFaint, marginBottom:'6px' } }, 'Why'),
      reasoning && React.createElement('div', { key:'r', style:{ color:t.textMuted, fontStyle:'italic' } }, reasoning),
    ].filter(Boolean));
  }

  renderLoginModal() {
    const { loginEmail, loginPassword, loginError } = this.state;
    const t = this.t;

    return React.createElement('div', {
      onClick: (e) => { if (e.target === e.currentTarget) this.setState({ loginOpen: false, loginError: '' }); },
      style: { position:'fixed', inset:0, background:t.modalBg, display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000, backdropFilter:'blur(5px)', WebkitBackdropFilter:'blur(5px)' }
    },
      React.createElement('div', { style:{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:'16px', padding:'32px', width:'340px', boxShadow:t.shadow } }, [
        React.createElement('div', { key:'logo', style:{ width:38, height:38, borderRadius:'9px', background:t.accent, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:'14px', fontWeight:700, marginBottom:'16px' } }, '◆'),
        React.createElement('h2', { key:'h', style:{ margin:'0 0 4px', fontSize:'20px', fontWeight:700, color:t.text } }, 'Admin Login'),

        React.createElement('form', { key:'form', onSubmit:(e)=>this.handleLogin(e) }, [
          React.createElement('div', { key:'fs', style:{ display:'flex', flexDirection:'column', gap:'10px', marginBottom:'16px' } }, [
            React.createElement('input', { key:'e', type:'text', placeholder:'Username', value:loginEmail, autoFocus:true, autoComplete:'off', onChange:(e)=>this.setState({loginEmail:e.target.value}), style:{ ...inputBase(t), padding:'10px 14px', fontSize:'14px', borderRadius:'8px' } }),
            React.createElement('input', { key:'p', type:'password', placeholder:'Password', value:loginPassword, onChange:(e)=>this.setState({loginPassword:e.target.value}), style:{ ...inputBase(t), padding:'10px 14px', fontSize:'14px', borderRadius:'8px' } }),
            loginError && React.createElement('p', { key:'err', style:{ fontSize:'12px', color:'#f87171', margin:0 } }, loginError),
          ].filter(Boolean)),
          React.createElement('div', { key:'btns', style:{ display:'flex', gap:'8px', justifyContent:'flex-end' } }, [
            React.createElement('button', { key:'cancel', type:'button', onClick:()=>this.setState({loginOpen:false,loginError:''}), style:{ padding:'9px 18px', borderRadius:'8px', border:`1px solid ${t.border}`, background:'transparent', color:t.textMuted, cursor:'pointer', fontSize:'14px', fontWeight:500 } }, 'Cancel'),
            React.createElement('button', { key:'submit', type:'submit', style:{ padding:'9px 22px', borderRadius:'8px', border:'none', background:t.accent, color:'#fff', cursor:'pointer', fontSize:'14px', fontWeight:600 } }, 'Sign in'),
          ]),
        ]),
      ])
    );
  }

  renderVals() {
    const { platforms, features, adminMode, loginOpen } = this.state;
    const t = this.t;
    const loading = !platforms || !features;

    return {
      tableEl: loading
        ? React.createElement('div', { style:{ padding:'64px', textAlign:'center', color:t.textFaint } }, 'Loading…')
        : this.renderTable(),
      popoverEl:  this.renderPopover(),
      loginModal: loginOpen ? this.renderLoginModal() : null,
      legendEl:   (!loading && !adminMode) ? this.renderLegend() : null,
      adminMode,
      showLoginBtn: !adminMode,
      darkIcon: this.isDark ? '☀' : '☾',
      toggleDark: () => {
        const next = !this.isDark;
        this.setState({ isDark: next }, () => {
          this.applyTheme();
          localStorage.setItem('ltm-v2-dark', next ? '1' : '0');
        });
      },
      openLogin: () => this.setState({ loginOpen: true }),
      logout: () => this.setState({ adminMode: false, editingPlatformId: null }),
    };
  }
}
</script>
</body>
</html>
